denominator_k = 10000
denominator_offset = 200
scale = -1.0

# --- Relationship stage multipliers ---
[favor_calc.stage_multiplier]
stranger = 1.0
friendly = 1.0
like = 1.2
love = 1.5
oath = 1.5

# --- Post-processing ---
[favor_calc.boundary]
# 反発刻印保底（MARK1保底-1，MARK2保底-2，MARK3保底-3）
mark_floor = { mark_key = "resentment", levels = { 1 = -1, 2 = -2, 3 = -3 } }
# 冷漠且非恋慕时：>1则/2

