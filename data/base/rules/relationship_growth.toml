# Relationship growth formulas (FAVOR_CALC / TRUST_CALC).
# Rebuilt to match eraTW semantics: each SOURCE has an independent upper-bound formula,
# talent/abl modifiers are mostly flat offsets, stage multipliers apply at the end.
#
# Upper-bound formula: contribution = (numerator - K / (SOURCE + C)) * scale
# As SOURCE → ∞, contribution → numerator * scale.
#
# The final delta = (sum of all SOURCE contributions + base_offsets) / global_divisor
#                   * stage_multiplier * post_multipliers
# Then clamped by mark_floor and boundary conditions.

[favor_calc]
description = "好感度变化公式：基于各SOURCE独立上限公式，受ABL/TALENT固定修正与关系阶段乘数"
global_divisor = 10

# --- Base offsets (flat additions from ABL/TALENT) ---

[[favor_calc.base_offset]]
kind = "abl_sum"
abl_indices = [10, 9]  # 従順, 親密
divisor = 2

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 11  # 态度（叛逆）
value = -2
condition = "value > 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 13  # 自尊心
value = -1
condition = "value > 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 11  # 态度（坦率）
value = 1
condition = "value < 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 20  # 自制心
value = -1
condition = "value != 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 22  # 感情缺乏
value = -1
condition = "value != 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 32  # 抵抗
value = -1
condition = "value != 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 62  # 献身的
value = 1
condition = "value != 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 24  # 开朗/阴郁
value = 1
condition = "value > 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 24  # 开朗/阴郁
value = 1
condition = "value < 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 70  # 快感应答
value = 1
condition = "value > 0"

[[favor_calc.base_offset]]
kind = "talent_fixed"
era_index = 70  # 快感应答
value = -1
condition = "value < 0"

# --- SOURCE contributions (upper-bound formulas) ---
# Positive contributors

[[favor_calc.source]]
key = "pleasure_sum"
description = "快感合计（快C+V+A+B）"
formula = "upper_bound"
numerator = 100
denominator_k = 30000
denominator_offset = 300
scale = 1.0

[[favor_calc.source]]
key = "affection"
description = "情愛"
formula = "upper_bound"
numerator = 100
denominator_k = 100000
denominator_offset = 1000
scale = 1.0

