# Negative contributors

[[favor_calc.source]]
key = "fear"
description = "恐怖"
formula = "upper_bound"
numerator = 50
denominator_k = 20000
denominator_offset = 400
scale = -1.0
abl_modifier = { abl_index = 10, offset = -3, divisor = 3 }  # (ABL:従順 - 3) / 3

[[favor_calc.source]]
