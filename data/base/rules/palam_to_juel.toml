# PALAM → JUEL 转化规则
# 每次 settlement 后，PALAM 的增量按 divisor 比例转化为对应 JUEL
# palam_index: PALAM 轴索引（对应 palam.toml）
# juel_index: JUEL 轴索引（对应 juel.toml，通常与 palam_index 相同）
# divisor: 除数，JUEL 增量 = PALAM 增量 / divisor（整数除法）

[[rule]]
palam_index = 0
juel_index = 0
divisor = 100

[[rule]]
palam_index = 1
juel_index = 1
divisor = 100

