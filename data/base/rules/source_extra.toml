# SOURCE_EXTRA：全局 SOURCE 修饰器（在 SOURCE_CBVA 之前执行）
# 对应 eraTW 的 SOURCE_EXTRA 阶段。
# 按目标 SOURCE 索引分组，而非按天赋。
#
# 每个修饰器作用于一个或多个 SOURCE 索引。
# 同一修饰器内的多个条件独立判断，结果乘叠。
#
# 支持的条件类型：
#   talent_value   → 倍率 = (base + coeff * talent值) / base
#   talent_present → 若 talent > 0，应用固定倍率
#   talent_level   → 根据 talent 具体值查 levels 表取倍率

# ==================== 陥落素質：全局快感加成 ====================

# 恋慕(3)/淫乱(4)/服従(5) → 所有快感类 ×1.2
[[modifier]]
target_sources = ["0", "1", "2", "3", "4"]
description = "恋慕/淫乱/服従 全局快感加成"
operation = "multiply"

[[modifier.condition]]
kind = "talent_present"
talent_index = 3
multiplier = 1.2

[[modifier.condition]]
kind = "talent_present"
talent_index = 4
multiplier = 1.2

[[modifier.condition]]
kind = "talent_present"
talent_index = 5
multiplier = 1.2

