# SOURCE_CBVA: per-SOURCE processing rules (SOURCE → CUP)
# Mirrors eraTW's SOURCE_CBVA phase: each SOURCE axis gets independent
# sensitivity / ABL / PALAM-level / desire processing before global modifiers.
#
# Evaluation order within a rule:
#   1. sensitivity   — (2 + talent_value) / 2
#   2. abl_scale     — 1 + abl_value * scale
#   3. palam_level   — lookup by current PALAM level
#   4. exp_gate      — min EXP required, else zero (placeholder)
#   5. lubrication   — dry penalty for V/A SOURCE (placeholder)
#   6. body_type     — size adjustment (placeholder)

# ==================== 快感 SOURCE (快C/V/A/B/M) ====================

[[rule]]
source_index = 0  # 快C
cup_index = 0

# 【新写法】talent_level 完全自定义映射，TOML 控制每个值对应的倍率
[[rule.factor]]
kind = "talent_level"
talent_index = 101
# 0=钝感 1=正常 2=敏感 3=过敏 4=超敏
# 正常(v=1)应为基准 1.0，钝感(v=0)应低于 1.0，敏感以上应高于 1.0
levels = {0 = 0.5, 1 = 1.0, 2 = 1.5, 3 = 2.0, 4 = 2.5}

[[rule.factor]]
kind = "abl_scale"
abl_index = 0
scale = 0.1

[[rule.factor]]
kind = "palam_level"
palam_index = 11
levels = {0 = 1.0, 1 = 1.2, 2 = 1.5, 3 = 2.0, 4 = 3.0}

[[rule.factor]]
kind = "abl_scale"
abl_index = 11
scale = 0.1

