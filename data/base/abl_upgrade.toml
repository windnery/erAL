# ABL upgrade thresholds.
# EXPLV[0]=1, EXPLV[1]=4, EXPLV[2]=20, ... EXPLV[12]=10000
# requirement = MAX(1, EXPLV[current_level + 1 - aptitude_offset] * default_rate / rate)

[defaults]
default_rate = 1.0

[explv]
0 = 1
1 = 4
2 = 20
3 = 50
4 = 200
5 = 500
6 = 1000
7 = 2000
8 = 3000
9 = 4000
10 = 5000
11 = 6000
12 = 10000

