# ABL upgrade thresholds.
# Each ABL level has an EXPLV index and a base experience requirement.
# The requirement is modified by the aptitude TALENT (era_index=278).
# requirement = base_demand * (default_rate / abl_up_rate[abl_id])
# EXPLV[index - aptitude_offset] gives the actual threshold.

[defaults]
default_rate = 1.0

[explv]
0 = 1
1 = 4
2 = 20
3 = 50
4 = 200
5 = 500
6 = 1000
7 = 2000
8 = 3000
9 = 4000
10 = 5000
11 = 6000
12 = 10000

