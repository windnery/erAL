[[entries]]
key = "destroyer_chat_command_office"
actor_key = "starter_destroyer"
priority = 10
lines = [
  "驱逐舰本来还在椅子上晃腿，看见你靠近后一下子精神了起来。",
  "「前辈，你是来找我聊天的吗？那我可不会客气哦！」",
]

[[entries]]
