[[entries]]
key = "cruiser_chat_cafeteria"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "巡洋舰把餐盘往旁边挪了挪，示意你可以直接坐过来。",
  "「餐后的这点时间最适合聊天了。前辈如果不急，我很乐意再多陪一会儿。」",
]

[[entries]]
key = "cruiser_serve_tea_calm"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她接过热茶时先闻了闻香气，像是连这一步都不愿意省略。",
  "「谢谢。和前辈一起喝茶的时候，时间总会慢下来一点。」",
]

[[entries]]
key = "cruiser_listen_gentle"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她把那些压在心里的话慢慢说出来，语速不快，却能听出明显松了口气。",
  "「能这样被前辈安静听着，对我来说比想象中更重要。」",
]

[[entries]]
key = "cruiser_clink_harbor"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她把杯子轻轻碰上来，动作克制得刚刚好，像是连这一声清响都算进了节奏里。",
  "「这种碰杯的时刻，如果对象是前辈，我会更想认真记住。」",
]

[[entries]]
key = "cruiser_share_snack_calm"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她接过零食后先认真看了一眼包装，像是在确认你是不是特地挑过。",
  "「谢谢。和前辈一起吃的话，味道总会比平时更好一点。」",
]

[[entries]]
key = "cruiser_praise_office"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她轻轻笑了一下，明明是在接受夸奖，语气却依旧稳稳当当。",
  "「能得到前辈这样的评价，我会把今天剩下的工作也处理得更从容。」",
]

[[entries]]
key = "cruiser_rest_quiet"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她把肩膀放松下来时动作很小，像是连休息这件事都不愿意显得太张扬。",
  "「这样安静待一会儿，其实比我想象中更能恢复状态。」",
]

[[entries]]
key = "cruiser_study_office"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她读资料时很专注，偶尔抬眼和你交换一句看法，气氛便自然地往前推进了一点。",
  "「和前辈一起学习的时候，很多问题会比一个人想得更清楚。」",
]

[[entries]]
key = "cruiser_cook_cafeteria"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她处理食材的动作稳稳当当，像是在厨房里也能维持和指挥室一样的从容节奏。",
  "「料理和战术一样，火候与顺序都不能乱。前辈，接下来麻烦你把盘子递给我。」",
]

[[entries]]
key = "cruiser_meal_cafeteria"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她用餐的动作总是很安静，但并不会显得疏远，反而让人更容易把心情放平。",
  "「这种时候不用急着说话。能这样一起坐着，就已经很不错了。」",
]

[[entries]]
key = "cruiser_invite_meal_cafeteria"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "她听完你的邀请后没有立刻回答，只是温和地望着你，像在确认你是不是也期待这一餐。",
  "「好啊。比起匆忙解决，我更想和前辈好好把这顿饭吃完。」",
]

[[entries]]
key = "cruiser_date_watch_sea"
actor_key = "starter_cruiser"
priority = 10
lines = [
  "海风吹过时，她把视线投向远处的水面，整个人都显得比平时柔和许多。",
  "「如果前辈愿意的话，这样的夜景我想再和你多看几次。」",
]

[[entries]]
