# SOURCE → CUP 修正规则
# source_index: 引用 axes/source.toml 的 index
# target_cup_index: 通常与 source_index 相同
#
# 修正公式采用 eraTW 标准：
#   CUP = SOURCE × 感度倍率 × ABL感覚倍率 × 欲情等级倍率 × 欲望ABL倍率
#
# [[modifier]]
# source_index = 0  # 快C
# target_cup_index = 0
#
# [[modifier.factor]]
# kind = "sensitivity"       # 感度倍率
# talent_index = 101         # Ｃ感度 TALENT
# base_multiplier = 2.0      # (2 + EX) / 2 中的 2
#
# [[modifier.factor]]
# kind = "abl"
# abl_index = 0              # Ｃ感覚 ABL
# scale = 1.0                # 倍率 = 1 + ABL值 × scale
#
# [[modifier.factor]]
# kind = "palam_level"
# palam_index = 11           # 欲情 PALAM
# levels = {0 = 1.0, 1 = 1.2, 2 = 1.5, 3 = 2.0, 4 = 3.0}
#
# [[modifier.factor]]
# kind = "desire_abl"
# abl_index = 11             # 欲望 ABL
# scale = 0.1
