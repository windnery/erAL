# 指令效果定义（统一格式）
# command_index: 引用 train.toml 的 index
#
# [source]        原始 SOURCE 值（结算管道输入）
#   target = {index = value, ...}
#   player = {index = value, ...}
#
# [vitals]        体力/气力/精力消耗
#   target = {体力index = delta, ...}
#   player = {体力index = delta, ...}
#
# [experience]    经验值增加
#   target = {经验index = delta, ...}
#   player = {经验index = delta, ...}
#
# [conditions]    临时标志设置
#   tcvar = {index = value, ...}
#   tflag = {index = value, ...}
#
# [stains]        污垢转移（待设计）
# [resources]     资源消耗（TSP/道具/金钱）
# [scene]         场景切换/位置移动/时间推进
# [equipment]     装备穿戴/姿势设定

