# TALENT effects on SOURCE settlement pipeline.
# Each entry defines a multiplier or addition applied during SOURCE_EXTRA phase.
# era_index: the TALENT era_index from tw_axis_registry.
# formula: "multiply" scales existing SOURCE, "add" adds a flat bonus, "recovery_modifier" is for recovery.
# expression: a Python expression where v = talent_value. Available: max(), min(), int().
# source_key: which SOURCE axis this modifies. "" means no direct SOURCE modification.
# talent_value=0 means absent: multiply effects are skipped (1x), add effects add 0.

[[effect]]
era_index = 101
label = "C sensitivity"
category = "sense"
source_key = "pleasure_c"
formula = "multiply"
expression = "(2 + v) / 2"

