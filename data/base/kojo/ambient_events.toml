# 日常随机事件池 — 在时段推进时以小概率触发
# 用于给日常循环增加变数。事件仅带 message 与 tags，不改变数值。
# cooldown_days：同一事件至少隔多少天才可再次触发。

[[events]]
key = "morning_breeze"
weight = 10
time_slots = ["morning"]
location_tags = ["public", "harbor"]
cooldown_days = 2
message = "清晨的海风拂过港区，带来些许盐味。"
tags = ["ambient_weather"]

