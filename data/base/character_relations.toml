# 舰娘之间的预设好感关系
#
# 每条 [[relations]] 定义一条有向关系：from → to 的 affinity。
# A→B 和 B→A 可以不对称（一方主动亲近、另一方冷淡是常态）。
#
# 字段：
#   from      : 角色 key
#   to        : 角色 key
#   affinity  : 好感值，范围 -100 ~ +100；未列出默认 0（中立）
#   tags      : 用于事件/对话条件匹配的标签列表（可空）
#
# 示例：
#   [[relations]]
#   from = "enterprise"
#   to = "yorktown"
#   affinity = 85
#   tags = ["姐妹舰", "挚友"]
#
#   [[relations]]
#   from = "taihou"
#   to = "archerfish"
#   affinity = -70
#   tags = ["宿敌"]

# ── 当前 roster 的初始关系（可以继续补充）────────────────────────

[[relations]]
from = "enterprise"
to = "laffey"
affinity = 35
tags = ["鹰酱阵营"]

